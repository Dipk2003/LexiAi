# ========================
# Server Configuration
# ========================
server.port=8080

# ========================
# MySQL Configuration
# ========================

spring.datasource.url=jdbc:mysql://localhost:3306/lexiai_db?allowPublicKeyRetrieval=true&useSSL=false

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / Hibernate Configuration
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ========================
# JWT Configuration
# ========================
app.jwt.secret=your_jwt_secret_key_here
app.jwt.expiration=86400000  # 1 day in milliseconds

# ========================
# CORS Configuration (optional, adjust for frontend domain)
# ========================
# spring.web.cors.allowed-origins=http://localhost:3000
# spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
